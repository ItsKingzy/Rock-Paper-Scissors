<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="./styles.css">

        <!-- Font for the webpage -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="container">

            <div id="webpage-title">
                <img src="./img/title.png" alt="Rock Paper Scissors Title">
            </div>
            
            <div id="scoreboard">
                <img src="./img/oak-sign.png" alt="Scoreboard">
                <div class="score-title">Score</div>
                <div id="scores">

                    <div id="player-score">
                        <div class="player"></div>
                        <div class="score"></div>
                    </div>


                    <div id="computer-score">
                        <div class="computer"></div>
                        <div class="score"></div>
                    </div>

                </div>

            </div>


            <div id="buttons">
                <button id="rock"><img src="./img/rock.png" alt="Rock"></button>
                <button id="paper"><img src="./img/paper.png" alt="Paper"></button>
                <button id="scissors"><img src="./img/scissors.png" alt="Scissors"></button>
            </div>
        </div>
        

        <script src="./script.js"></script>
    </body>

</html>
