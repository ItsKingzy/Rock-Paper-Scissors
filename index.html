<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="./styles.css">

        <!-- Font for the webpage -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    </head>

    <body>
        <!-- Background -->
        <div id="background"></div>

        <div class="container">

            <div id="webpage-title">
                <img src="./img/title.png" alt="Rock Paper Scissors Title">
            </div>

            <div id="all-stats">
                <div id="game-state">
                    <img src="./img/oak-sign-2.png" alt="Scoreboard">
                    <div id="round-results">First to 5 wins!</div>
                    <div class="score-title">Score</div>
                </div>

                <div id="scoreboard">
                    <div id="player-scoreboard">
                        <img src="./img/score-sign.png" alt="">
                        <div class="stats">
                            <div class="player">You</div>
                            <div class="score">0</div>
                        </div>
                    </div>
                    
                    <div id="computer-scoreboard">
                        <img src="./img/score-sign.png" alt="">
                        <div class="stats">
                            <div class="computer">AI</div>
                            <div class="score">0</div>
                        </div>
                    </div>
                </div>
            </div>
            
        


            <div id="buttons">
                <button id="rock"><img src="./img/rock.png" alt="Rock"></button>
                <button id="paper"><img src="./img/paper.png" alt="Paper"></button>
                <button id="scissors"><img src="./img/scissors.png" alt="Scissors"></button>
            </div>
        </div>
        

        <script src="./script.js"></script>
    </body>

</html>
