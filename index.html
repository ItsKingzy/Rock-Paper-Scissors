<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="./styles.css">

        <!-- Font for the webpage -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    </head>

    <body>
        <!-- Background -->
        <div id="background"></div>

        <div class="container">

            <div id="webpage-title">
                <img src="./img/title.png" alt="Rock Paper Scissors Title">
            </div>

            <div id="all-stats">
                <div id="game-state">
                    <img src="./img/oak-sign-2.png" alt="Scoreboard">
                    <div id="oak-sign-header">First to 5, wins!</div>
                    <div id="round-results"></div>
                    <button id="reset-button">
                        <img class="reset-no-hover" src="./img/reset-no-hover.png" alt="Reset button when not hovinmgh over button">
                        <img class="reset-hover" src="./img/reset-hover.png" alt="Reset button when hovering over button">
                    </button>
                </div>

                <div id="scoreboard">
                    <div id="player-scoreboard">
                        <img src="./img/score-sign.png" alt="">
                        <div class="stats">
                            <div class="player">You</div>
                            <div class="score">0</div>
                        </div>
                    </div>
                    
                    <div id="computer-scoreboard">
                        <img src="./img/score-sign.png" alt="">
                        <div class="stats">
                            <div class="computer">AI</div>
                            <div class="score">0</div>
                        </div>
                    </div>
                </div>
            </div>
           
            <div id="buttons">
                <button id="rock"><img src="./img/rock.png" alt="Rock"></button>
                <button id="paper"><img src="./img/paper.png" alt="Paper"></button>
                <button id="scissors"><img src="./img/scissors.png" alt="Scissors"></button>
            </div>
        </div>
        
        <footer>
            <div id="footer-links">

                <div id="name">&#169; 2026 Cameron Larson</div>

                <a id="github" href="https://github.com/ItsKingzy">
                    <img src="./img/github-logo.png" alt="">
                    <div class="github">ItsKingzy</div>
                </a>

            </div>
        </footer>

        <script src="./script.js"></script>
    </body>

</html>
